services:
  app:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
      target: dev
    ports:
      - "8501:8501"
    volumes:
      - ../../app:/app/app
      - ../../tests:/app/tests
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - DEBUG=true
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: homefinance
      POSTGRES_PASSWORD: homefinance
      POSTGRES_DB: homefinance
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homefinance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
